<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SETEC Portal - Login & Register</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Bootstrap Icons CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Google Fonts: Inter and Kantumruy Pro -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Kantumruy+Pro:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', 'Kantumruy Pro', sans-serif;
            background: radial-gradient(circle at top right, #eff6ff 0%, #f8fafc 100%);
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.05);
        }
        .glow-btn {
            box-shadow: 0 4px 14px rgba(37, 99, 235, 0.3);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md">
        <!-- Card Container -->
        <div class="glass-panel rounded-3xl p-8 md:p-10 relative overflow-hidden">
            
            <!-- Top Accent Glow -->
            <div class="absolute -top-10 -left-10 w-32 h-32 bg-blue-400/10 rounded-full blur-2xl"></div>
            <div class="absolute -bottom-10 -right-10 w-32 h-32 bg-indigo-400/10 rounded-full blur-2xl"></div>

            <!-- Brand Header -->
            <div class="flex flex-col items-center mb-8 relative z-10">
               
                <div class="bg-blue-600 w-12 h-12 rounded-2xl flex items-center justify-center text-white font-black text-sm shadow-lg shadow-blue-500/20 mb-3">
                    SETEC
                </div>
                <h2 class="text-xl font-black text-slate-800">SETEC PORTAL</h2>
                <p id="form-subtitle" class="text-xs text-slate-400 mt-1 font-medium">Please enter your account to continue.</p>
            </div>

            <!-- ============================================= -->
            <!-- 1. LOGIN FORM (ទម្រង់ឡុកអ៊ីន) -->
            <!-- ============================================= -->
            <form id="login-form" class="space-y-5 relative z-10" onsubmit="handleLogin(event)">
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Username or email</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center text-slate-400">
                            <i class="bi bi-person-fill"></i>
                        </span>
                        <input type="text" required class="w-full bg-slate-50 border border-slate-200 focus:border-blue-500 focus:bg-white rounded-xl pl-10 pr-4 py-3 text-sm text-slate-800 placeholder-slate-400 transition-all outline-none" placeholder="Username or Email">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">password</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center text-slate-400">
                            <i class="bi bi-lock-fill"></i>
                        </span>
                        <input type="password" id="login-password" required class="w-full bg-slate-50 border border-slate-200 focus:border-blue-500 focus:bg-white rounded-xl pl-10 pr-10 py-3 text-sm text-slate-800 placeholder-slate-400 transition-all outline-none" placeholder="••••••••">
                        <button type="button" onclick="togglePasswordVisibility('login-password', 'login-eye')" class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-400 hover:text-slate-600">
                            <i id="login-eye" class="bi bi-eye-slash"></i>
                        </button>
                    </div>
                </div>

                <div class="flex items-center justify-between text-xs font-semibold">
                    <label class="flex items-center gap-2 text-slate-500 cursor-pointer">
                        <input type="checkbox" class="w-4 h-4 rounded border-slate-300 text-blue-600 focus:ring-blue-500 cursor-pointer">
                        Remember me
                    </label>
                    <a href="#" class="text-blue-600 hover:underline">Forgot your code?</a>
                </div>

                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3.5 rounded-xl transition-all duration-200 glow-btn text-sm">
                    Login
                </button>

                <p class="text-center text-xs text-slate-500 mt-6">
                    មិនទាន់មានគណនីមែនទេ? 
                    <a href="#" onclick="toggleForms(true)" class="text-blue-600 hover:underline font-bold ml-1">Create a new account</a>
                </p>
            </form>

            <!-- ============================================= -->
            <!-- 2. REGISTER FORM (ទម្រង់ចុះឈ្មោះ) -->
            <!-- ============================================= -->
            <form id="register-form" class="space-y-5 hidden relative z-10" onsubmit="handleRegister(event)">
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Fullname</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center text-slate-400">
                            <i class="bi bi-person-bounding-box"></i>
                        </span>
                        <input type="text" required class="w-full bg-slate-50 border border-slate-200 focus:border-blue-500 focus:bg-white rounded-xl pl-10 pr-4 py-3 text-sm text-slate-800 placeholder-slate-400 transition-all outline-none" placeholder="e.g. SOK SOPHEA">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Email</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center text-slate-400">
                            <i class="bi bi-envelope-fill"></i>
                        </span>
                        <input type="email" required class="w-full bg-slate-50 border border-slate-200 focus:border-blue-500 focus:bg-white rounded-xl pl-10 pr-4 py-3 text-sm text-slate-800 placeholder-slate-400 transition-all outline-none" placeholder="example@setec.edu.kh">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">password</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center text-slate-400">
                            <i class="bi bi-lock-fill"></i>
                        </span>
                        <input type="password" id="register-password" required class="w-full bg-slate-50 border border-slate-200 focus:border-blue-500 focus:bg-white rounded-xl pl-10 pr-10 py-3 text-sm text-slate-800 placeholder-slate-400 transition-all outline-none" placeholder="••••••••">
                        <button type="button" onclick="togglePasswordVisibility('register-password', 'register-eye')" class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-400 hover:text-slate-600">
                            <i id="register-eye" class="bi bi-eye-slash"></i>
                        </button>
                    </div>
                </div>

                <div class="flex items-start text-xs text-slate-500 leading-relaxed">
                    <label class="flex items-start gap-2 cursor-pointer">
                        <input type="checkbox" required class="mt-0.5 w-4 h-4 rounded border-slate-300 text-blue-600 focus:ring-blue-500 cursor-pointer">
                        <span>I agree to <a href="#" class="text-blue-600 font-semibold hover:underline">Terms of Use</a> System-related</span>
                    </label>
                </div>

                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3.5 rounded-xl transition-all duration-200 glow-btn text-sm">
                    Sign up
                </button>

                <p class="text-center text-xs text-slate-500 mt-6">
                    Already have an account?
                    <a href="#" onclick="toggleForms(false)" class="text-blue-600 hover:underline font-bold ml-1">Log in here</a>
                </p>
            </form>

        </div>
    </div>

    <!-- JavaScript For Interaction -->
    <script>
        
        function toggleForms(showRegister) {
            const loginForm = document.getElementById('login-form');
            const registerForm = document.getElementById('register-form');
            const subtitle = document.getElementById('form-subtitle');

            if (showRegister) {
                loginForm.classList.add('hidden');
                registerForm.classList.remove('hidden');
                subtitle.innerText = 'បង្កើតគណនីដើម្បីគ្រប់គ្រងវត្តមានសិស្ស';
            } else {
                registerForm.classList.add('hidden');
                loginForm.classList.remove('hidden');
                subtitle.innerText = 'សូមបញ្ចូលគណនីរបស់អ្នកដើម្បីបន្ត';
            }
        }

       
        function togglePasswordVisibility(inputFieldId, eyeIconId) {
            const passwordInput = document.getElementById(inputFieldId);
            const eyeIcon = document.getElementById(eyeIconId);

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.className = 'bi bi-eye';
            } else {
                passwordInput.type = 'password';
                eyeIcon.className = 'bi bi-eye-slash';
            }
        }

      
        function handleLogin(event) {
            event.preventDefault();
            alert('Login successful! The system is taking you to the dashboard...');
            // បងអាចប្តូរទៅកាន់ទំព័រ Sidebar របស់បង ឧទាហរណ៍៖ window.location.href = "index.html";
              window.location.href = "../html/dashboard.html";
        }
           
        // 4. សាកល្បងដំណើរការ Register (Mock Register)
        function handleRegister(event) {
            event.preventDefault();
            alert('✅ Account created successfully! Please log in to access it.');
            toggleForms(false);
        }
    </script>
</body>
</html>
